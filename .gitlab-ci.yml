workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

stages:
  - meta
  - validate
  - promote

default:
  image: python:3.11-slim
  interruptible: true

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR/src"

cache:
  key: "pip-$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip
  - pip install -e ".[dev]"

pipeline_smoke:
  stage: meta
  script:
    - echo "Pipeline started for $CI_COMMIT_SHORT_SHA"

baseline_checks:
  stage: validate
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - config/**/*
        - scripts/**/*
        - pyproject.toml
        - requirements*.txt
        - .gitlab-ci.yml
  script:
    - python -m compileall src
    - python -m pytest -q

self_check_smoke:
  stage: validate
  rules:
    - changes:
        - src/**/*
        - config/**/*
        - scripts/**/*
        - pyproject.toml
        - requirements*.txt
        - .gitlab-ci.yml
  script:
    - python -m arqon_guardian.cli --config config/default.yml config ensure-keys --config-mode refs
    - python -m arqon_guardian.cli --config config/default.yml self-check --skip-bind-check

promote_to_public:
  stage: promote
  image: alpine:3.20
  needs:
    - job: baseline_checks
      optional: true
    - job: self_check_smoke
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - when: never
  before_script:
    - apk add --no-cache git
  script:
    - if [ -z "${ARQON_PUBLIC_PUSH_TOKEN:-}" ]; then echo "Missing ARQON_PUBLIC_PUSH_TOKEN variable"; exit 1; fi
    - PUBLIC_REMOTE="https://oauth2:${ARQON_PUBLIC_PUSH_TOKEN}@gitlab.com/reekonovv/arqon-dev-public.git"
    - git config --global user.name "arqon-ci"
    - git config --global user.email "ci@arqon.local"
    - git fetch "$PUBLIC_REMOTE" main
    - git merge --no-edit --allow-unrelated-histories -X ours FETCH_HEAD || { echo "Merge conflict during promote. Resolve dev/public divergence manually."; exit 1; }
    - git push "$PUBLIC_REMOTE" HEAD:main


