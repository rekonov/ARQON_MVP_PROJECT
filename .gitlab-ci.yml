workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

stages:
  - meta
  - validate

default:
  image: python:3.11-slim
  interruptible: true

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR/src"

cache:
  key: "pip-$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip
  - pip install -e ".[dev]"

pipeline_smoke:
  stage: meta
  script:
    - echo "Pipeline started for $CI_COMMIT_SHORT_SHA"

baseline_checks:
  stage: validate
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - config/**/*
        - scripts/**/*
        - pyproject.toml
        - requirements*.txt
        - .gitlab-ci.yml
  script:
    - python -m compileall src
    - python -m pytest -q

self_check_smoke:
  stage: validate
  allow_failure: true
  rules:
    - changes:
        - src/**/*
        - config/**/*
        - scripts/**/*
        - pyproject.toml
        - requirements*.txt
        - .gitlab-ci.yml
  script:
    - python -m arqon_guardian.cli --config config/default.yml config ensure-keys --config-mode refs
    - python -m arqon_guardian.cli --config config/default.yml self-check --skip-bind-check
